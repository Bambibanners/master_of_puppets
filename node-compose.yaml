
version: '3.8'
services:
  puppet:
    image: localhost/master-of-puppets-node:latest
    container_name: puppet-node
    network_mode: host
    environment:
      - AGENT_URL=https://localhost:8001
      - JOIN_
      - MOUNT_DATA=
      - NODE_TAGS=general,linux,arm64
    volumes:
      - ./secrets:/app/secrets
    restart: unless-stopped
